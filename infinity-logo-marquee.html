    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --marquee-speed: 30s;
        --logo-gap: clamp(0.75rem, 2vw, 1.25rem);
      }

      .marquee-wrap {
        position: relative;
        overflow: hidden;
        border-radius: 1.25rem;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background:
          radial-gradient(120% 120% at 10% 10%, rgba(56, 189, 248, 0.12) 0%, transparent 36%),
          radial-gradient(80% 100% at 90% 100%, rgba(59, 130, 246, 0.08) 0%, transparent 45%),
          linear-gradient(180deg, #121722 0%, #0b0f17 100%);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05), 0 22px 60px rgba(0, 0, 0, 0.45);
      }

      .marquee-wrap::before,
      .marquee-wrap::after {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        width: min(10vw, 88px);
        pointer-events: none;
        z-index: 2;
      }

      .marquee-wrap::before {
        left: 0;
        background: linear-gradient(to right, rgba(11, 15, 23, 0.96), rgba(11, 15, 23, 0));
      }

      .marquee-wrap::after {
        right: 0;
        background: linear-gradient(to left, rgba(11, 15, 23, 0.96), rgba(11, 15, 23, 0));
      }

      .marquee-track {
        display: flex;
        width: max-content;
        animation: logo-scroll var(--marquee-speed) linear infinite;
      }

      .marquee-group {
        display: flex;
        align-items: center;
        gap: var(--logo-gap);
        margin: 0;
        padding: 1rem var(--logo-gap) 1rem 0;
        list-style: none;
        flex-shrink: 0;
      }

      .logo-chip {
        --brand: #9ca3af;
        flex-shrink: 0;
      }

      .logo-chip svg {
        height: clamp(2.25rem, 5vw, 2.9rem);
        width: auto;
        color: rgb(148 163 184);
        opacity: 0.86;
        filter: grayscale(1) saturate(0.1);
        transition: filter 240ms ease, color 240ms ease, opacity 240ms ease, transform 240ms ease;
      }

      .logo-chip:hover svg {
        filter: grayscale(0) saturate(1);
        color: var(--brand);
        opacity: 1;
        transform: translateY(-1px);
      }

      .logo-pill {
        fill: rgba(255, 255, 255, 0.045);
        stroke: rgba(148, 163, 184, 0.36);
        stroke-width: 1;
      }

      .logo-glyph {
        fill: currentColor;
      }

      .logo-text {
        fill: currentColor;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.1px;
      }

      @keyframes logo-scroll {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(-50%);
        }
      }

      @media (max-width: 640px) {
        :root {
          --marquee-speed: 22s;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .marquee-track {
          animation: none;
        }
      }
    </style>
  </head>
